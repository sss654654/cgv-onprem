# 프론트 게이트웨이 — 정적 서빙 + API 리버스 프록시.
# 브라우저는 여기(한 진입점)만 본다. /api/admission/* → queue, 나머지 /api/* → booking.
# k3s에선 이 역할을 Ingress(Traefik)가 대신함 → 경로 규칙 그대로 이관 가능.
server {
    listen 8080;   # nginx-unprivileged(비루트) — k3s restricted PSA. compose도 8080으로 매핑.
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # queue(입장 통제): enter·position(폴링)·leave·complete
    # 폴링 전환(§1-2)으로 SSE 스트림 location 제거 — 짧은 요청·응답이라 버퍼off 불필요.
    location /api/admission/ {
        proxy_pass http://queue:8090;
    }

    # booking(예매): movies·screenings·seats·bookings
    location /api/ {
        proxy_pass http://booking:8091;
    }

    # SPA — 정적 파일, 없으면 index.html(클라 라우팅)
    # no-cache: 파일명에 해시가 없어 캐시버스팅 수단이 없음 → 재배포 시 구버전이 보이는 것 방지(F10).
    # 데모 규모라 매 요청 재검증 비용 무시 가능. (조건부 요청이라 304로 싸게 끝남.)
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
